version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/images/semgrep"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "semgrep"

  - package-ecosystem: "docker"
    directory: "/images/trivy"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "trivy"

  - package-ecosystem: "docker"
    directory: "/images/conftest"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "conftest"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
