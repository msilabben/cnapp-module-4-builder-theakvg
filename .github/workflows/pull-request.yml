name: Pull request

on:
  pull_request:
    paths:
      - images/**
      - scripts/discover-images.py
      - .github/dependabot.yml
      - .github/workflows/**
      - docs/**
      - README.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    name: Discover images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.images.outputs.images }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Read images from Dockerfiles
        id: images
        run: echo "images=$(python3 scripts/discover-images.py)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.image.name }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.discover.outputs.images) }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build smoke-test target
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ${{ matrix.image.context }}
          target: test
          pull: true
          push: false

      - name: Build final image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ${{ matrix.image.context }}
          target: final
          pull: true
          push: false
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}-wrapper
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ matrix.image.version }}
