name: Pull request security checks

on:
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/msilabben/semgrep@sha256:REPLACE_WITH_PUBLISHED_DIGEST
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run Semgrep
        run: semgrep ci

  trivy-config:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/msilabben/trivy@sha256:REPLACE_WITH_PUBLISHED_DIGEST
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run Trivy config scan
        run: trivy config --exit-code 1 .

  conftest:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/msilabben/conftest@sha256:REPLACE_WITH_PUBLISHED_DIGEST
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run Conftest
        run: conftest test .
